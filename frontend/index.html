<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chattie – KI-Sprachausgabe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="currentColor"/></svg>
          </div>
          <span class="logo-text">Chattie</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Sidebar schließen">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-label">Zielstimme</p>
        <div class="voice-select-wrap">
          <select id="voiceId" class="sidebar-select"></select>
          <button id="refreshVoices" class="icon-btn" title="Voices neu laden" aria-label="Voices neu laden">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M1 4v6h6M23 20v-6h-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>

      <div class="sidebar-section">
        <p class="sidebar-label">Tonlage</p>
        <div class="custom-select" id="presetSelect">
          <button class="custom-select-trigger" id="presetTrigger" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span id="presetLabel">😐 Sachlich</span>
            <svg class="custom-select-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <ul class="custom-select-list" role="listbox" id="presetList">
            <li class="custom-select-option selected" role="option" data-value="sachlich">😐 Sachlich</li>
            <li class="custom-select-option" role="option" data-value="freundlich">😊 Freundlich</li>
            <li class="custom-select-option" role="option" data-value="energetisch">⚡ Energetisch</li>
            <li class="custom-select-option" role="option" data-value="jugendlich">🧑‍💻 Jugendlich</li>
            <li class="custom-select-option" role="option" data-value="bestimmt">😤 Bestimmt</li>
            <li class="custom-select-option" role="option" data-value="eindringlich">😠 Eindringlich</li>
          </ul>
        </div>
        <!-- hidden value for JS -->
        <input type="hidden" id="ttsPreset" value="sachlich" />
      </div>

      <div class="sidebar-section">
        <p class="sidebar-label">Sprechgeschwindigkeit</p>
        <div class="speed-wrap">
          <input id="ttsRate" type="range" min="-100" max="100" value="0" class="speed-slider" />
          <div class="speed-labels">
            <span>Langsam</span>
            <span id="speedValue">Normal (0)</span>
            <span>Schnell</span>
          </div>
        </div>
      </div>

      <input id="ttsVoice" type="hidden" value="de-DE-KatjaNeural" />

      <div class="sidebar-footer">
        <div class="status-badge" id="statusBadge">
          <span class="status-dot"></span>
          <span id="statusText">Bereit</span>
        </div>
      </div>
    </aside>

    <div class="layout" id="layout">
      <header class="topbar">
        <button class="topbar-menu" id="openSidebar" aria-label="Sidebar öffnen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <span class="topbar-title">Chattie</span>
        <div class="topbar-pills">
          <label class="pill active" id="pillText">
            <input type="radio" name="mode" value="text" checked hidden />
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M4 12h10M4 18h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            Text
          </label>
          <label class="pill" id="pillAudio">
            <input type="radio" name="mode" value="audio" hidden />
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Audio
          </label>
        </div>
      </header>

      <main class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <h2>Sprachausgabe erzeugen</h2>
          <p>Text eingeben oder Audiodatei hochladen, dann auf Senden klicken.</p>
        </div>
      </main>

      <footer class="input-bar">
        <div class="input-wrap" id="textWrap">
          <textarea id="textInput" rows="1" placeholder="Text eingeben..." class="chat-input"></textarea>
        </div>
        <div class="input-wrap hidden" id="audioWrap">
          <label class="file-label" id="fileLabel">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span id="fileLabelText">Audiodatei waehlen...</span>
            <input id="audioInput" type="file" accept="audio/*" hidden />
          </label>
        </div>
        <button class="send-btn" id="runBtn" aria-label="Senden">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </footer>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
