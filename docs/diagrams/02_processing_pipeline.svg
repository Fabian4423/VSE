<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="520" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="320" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Verarbeitungspipeline: Text → Chatterbox TTS → WAV</text>

  <!-- Step 1: Text Input -->
  <rect x="145" y="68" width="350" height="48" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">1. Texteingabe (Browser)</text>
  <text x="320" y="107" text-anchor="middle" font-size="10" fill="#475569">"Hallo, dies ist ein Test." + Stimme: Alexander</text>
  <line x1="320" y1="116" x2="320" y2="142" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2: UI-Server forwards -->
  <rect x="145" y="142" width="350" height="48" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="164" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">2. UI-Server: POST /tts → Chatterbox</text>
  <text x="320" y="180" text-anchor="middle" font-size="10" fill="#475569">{ text, voice_mode: "predefined", predefined_voice_id: "Alexander.wav" }</text>
  <line x1="320" y1="190" x2="320" y2="216" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Chatterbox TTS -->
  <rect x="145" y="216" width="350" height="66" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2" filter="url(#shadow)"/>
  <text x="320" y="242" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">3. Chatterbox TTS (Host, GPU)</text>
  <text x="320" y="262" text-anchor="middle" font-size="11" fill="#334155">Text-to-Speech mit vordefinierter Stimme</text>
  <text x="320" y="276" text-anchor="middle" font-size="10" fill="#64748b">Ergebnis: WAV-Audiodatei (Binary)</text>
  <line x1="320" y1="282" x2="320" y2="308" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: UI-Server saves -->
  <rect x="145" y="308" width="350" height="48" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#78350f">4. UI-Server: WAV speichern</text>
  <text x="320" y="346" text-anchor="middle" font-size="10" fill="#475569">→ storage/output/&lt;uuid&gt;.wav</text>
  <line x1="320" y1="356" x2="320" y2="382" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: JSON Response -->
  <rect x="145" y="382" width="350" height="48" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="404" text-anchor="middle" font-size="12" font-weight="600" fill="#1e3a8a">5. JSON Response → Browser</text>
  <text x="320" y="420" text-anchor="middle" font-size="10" fill="#475569">{ output_audio_url: "/storage/output/&lt;uuid&gt;.wav" }</text>
  <line x1="320" y1="430" x2="320" y2="456" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="175" y="456" width="290" height="38" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="320" y="476" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">→ Wiedergabe / Download im Browser</text>
  <text x="320" y="490" text-anchor="middle" font-size="10" fill="#334155" font-family="monospace">GET /storage/output/&lt;uuid&gt;.wav</text>
</svg>
