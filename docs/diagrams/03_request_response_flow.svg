<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="7" refX="5" refY="7" orient="auto">
      <polygon points="0 0, 10 0, 5 7" fill="#475569"/>
    </marker>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrowL" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Request-Response-Zyklus (Text-Modus)</text>

  <!-- Lifelines -->
  <line x1="120" y1="70" x2="120" y2="590" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="400" y1="70" x2="400" y2="590" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="680" y1="70" x2="680" y2="590" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Actor headers -->
  <rect x="50" y="55" width="140" height="35" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Browser</text>

  <rect x="320" y="55" width="160" height="35" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">Bridge-Server</text>

  <rect x="610" y="55" width="140" height="35" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="680" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Applio CLI</text>

  <!-- Step 1 -->
  <line x1="120" y1="120" x2="400" y2="120" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="155" y="100" width="200" height="17" rx="3" fill="#dbeafe"/>
  <text x="255" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">1. POST /api/run</text>
  <text x="255" y="137" text-anchor="middle" font-size="9" fill="#64748b">{ "voice_id":"4", "text":"Hallo Welt" }</text>

  <!-- Step 2: Validate -->
  <rect x="355" y="155" width="90" height="30" rx="5" fill="#fefce8" stroke="#d97706" stroke-width="1"/>
  <text x="400" y="175" text-anchor="middle" font-size="10" fill="#78350f">2. Validieren</text>

  <!-- Step 3: Resolve model -->
  <rect x="340" y="200" width="120" height="38" rx="5" fill="#fefce8" stroke="#d97706" stroke-width="1"/>
  <text x="400" y="217" text-anchor="middle" font-size="10" fill="#78350f">3. Modell auflösen</text>
  <text x="400" y="231" text-anchor="middle" font-size="8" fill="#64748b">rvc/4/STS4_320e.pth</text>

  <!-- Step 4: Generate UUID -->
  <rect x="340" y="250" width="120" height="38" rx="5" fill="#fefce8" stroke="#d97706" stroke-width="1"/>
  <text x="400" y="267" text-anchor="middle" font-size="10" fill="#78350f">4. UUID erzeugen</text>
  <text x="400" y="281" text-anchor="middle" font-size="8" fill="#64748b">→ eindeutige Pfade</text>

  <!-- Step 5: subprocess call -->
  <line x1="400" y1="305" x2="680" y2="305" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="540" y="298" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">5. subprocess.run()</text>
  <text x="540" y="318" text-anchor="middle" font-size="9" fill="#64748b">python core.py tts --tts_text "Hallo Welt" ...</text>

  <!-- Applio processing box -->
  <rect x="640" y="335" width="80" height="90" rx="5" fill="#d1fae5" stroke="#16a34a" stroke-width="1"/>
  <text x="680" y="358" text-anchor="middle" font-size="10" fill="#14532d">TTS</text>
  <text x="680" y="373" text-anchor="middle" font-size="8" fill="#64748b">Edge-Stimme</text>
  <line x1="655" y1="382" x2="705" y2="382" stroke="#16a34a" stroke-width="0.5"/>
  <text x="680" y="400" text-anchor="middle" font-size="10" fill="#14532d">RVC</text>
  <text x="680" y="415" text-anchor="middle" font-size="8" fill="#64748b">Voice Conv.</text>

  <!-- Step 6: File result -->
  <line x1="680" y1="425" x2="400" y2="455" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowL)"/>
  <text x="540" y="448" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">6. output/&lt;uuid&gt;.wav</text>

  <!-- Step 7: Validate output -->
  <rect x="340" y="465" width="120" height="30" rx="5" fill="#fefce8" stroke="#d97706" stroke-width="1"/>
  <text x="400" y="485" text-anchor="middle" font-size="10" fill="#78350f">7. Output prüfen</text>

  <!-- Step 8: JSON Response -->
  <line x1="400" y1="510" x2="120" y2="510" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowL)"/>
  <text x="260" y="503" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">8. JSON Response</text>
  <text x="260" y="527" text-anchor="middle" font-size="9" fill="#64748b">{ "output_audio_url": "/storage/output/&lt;uuid&gt;.wav" }</text>

  <!-- Step 9: Audio download -->
  <line x1="120" y1="555" x2="400" y2="555" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowR)"/>
  <text x="260" y="548" text-anchor="middle" font-size="10" font-weight="600" fill="#0284c7">9. GET /storage/output/&lt;uuid&gt;.wav</text>

  <line x1="400" y1="575" x2="120" y2="575" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowL)"/>
  <text x="260" y="590" text-anchor="middle" font-size="10" fill="#0284c7">WAV-Datei (Binary)</text>
</svg>
