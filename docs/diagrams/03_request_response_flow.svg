<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="780" height="580" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="390" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Request-Response-Zyklus</text>

  <!-- Lifelines -->
  <line x1="120" y1="70" x2="120" y2="550" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="370" y1="70" x2="370" y2="550" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="650" y1="70" x2="650" y2="550" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Actor headers -->
  <rect x="50" y="55" width="140" height="35" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="120" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Browser</text>

  <rect x="288" y="55" width="164" height="35" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="71" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">local_ui_server.py</text>
  <text x="370" y="84" text-anchor="middle" font-size="9" fill="#92400e">VM · Port 5174</text>

  <rect x="570" y="55" width="160" height="35" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="650" y="71" text-anchor="middle" font-size="11" font-weight="700" fill="#14532d">Chatterbox TTS</text>
  <text x="650" y="84" text-anchor="middle" font-size="9" fill="#14532d">Host · Port 8004</text>

  <!-- Step 1: Browser → UI-Server -->
  <line x1="120" y1="122" x2="370" y2="122" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="163" y="104" width="155" height="16" rx="3" fill="#dbeafe"/>
  <text x="240" y="116" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">1. POST /api/run</text>
  <text x="240" y="138" text-anchor="middle" font-size="9" fill="#64748b">{ "voice_id": "Alexander", "text": "Hallo..." }</text>

  <!-- Step 2: Validate (UI-Server self) -->
  <rect x="330" y="155" width="80" height="28" rx="5" fill="#fefce8" stroke="#d97706" stroke-width="1"/>
  <text x="370" y="174" text-anchor="middle" font-size="10" fill="#78350f">2. Validieren</text>

  <!-- Step 3: UI-Server → Chatterbox -->
  <line x1="370" y1="198" x2="650" y2="198" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="428" y="180" width="163" height="16" rx="3" fill="#d1fae5"/>
  <text x="510" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">3. POST /tts</text>
  <text x="510" y="214" text-anchor="middle" font-size="9" fill="#64748b">{ text, voice_mode, predefined_voice_id }</text>

  <!-- Chatterbox processing box -->
  <rect x="610" y="234" width="80" height="58" rx="5" fill="#d1fae5" stroke="#16a34a" stroke-width="1"/>
  <text x="650" y="256" text-anchor="middle" font-size="10" fill="#14532d">4. TTS</text>
  <text x="650" y="272" text-anchor="middle" font-size="9" fill="#64748b">GPU-Synthese</text>
  <text x="650" y="286" text-anchor="middle" font-size="8" fill="#64748b">→ WAV erzeugen</text>

  <!-- Step 5: Chatterbox returns WAV to UI-Server -->
  <line x1="650" y1="306" x2="370" y2="332" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="510" y="327" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">5. Binary WAV Response</text>

  <!-- Step 6: UI-Server saves -->
  <rect x="302" y="348" width="135" height="42" rx="5" fill="#fefce8" stroke="#d97706" stroke-width="1"/>
  <text x="370" y="365" text-anchor="middle" font-size="10" fill="#78350f">6. WAV speichern</text>
  <text x="370" y="380" text-anchor="middle" font-size="9" fill="#64748b">→ output/&lt;uuid&gt;.wav</text>

  <!-- Step 7: UI-Server → Browser JSON -->
  <line x1="370" y1="404" x2="120" y2="404" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="245" y="397" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">7. JSON Response</text>
  <text x="245" y="420" text-anchor="middle" font-size="9" fill="#64748b">{ "output_audio_url": "/storage/output/&lt;uuid&gt;.wav" }</text>

  <!-- Step 8: Browser → UI-Server GET -->
  <line x1="120" y1="450" x2="370" y2="450" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowR)"/>
  <text x="245" y="443" text-anchor="middle" font-size="10" font-weight="600" fill="#0284c7">8. GET /storage/output/&lt;uuid&gt;.wav</text>

  <!-- Step 9: UI-Server → Browser WAV -->
  <line x1="370" y1="474" x2="120" y2="474" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowR)"/>
  <text x="245" y="492" text-anchor="middle" font-size="10" fill="#0284c7">9. WAV-Datei (Binary) → Wiedergabe / Download</text>
</svg>
