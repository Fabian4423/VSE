<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 700" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="980" height="700" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="490" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Request-Response-Zyklus (Text-Modus)</text>

  <!-- Lifelines -->
  <line x1="110" y1="70" x2="110" y2="670" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="340" y1="70" x2="340" y2="670" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="610" y1="70" x2="610" y2="670" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="870" y1="70" x2="870" y2="670" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Actor headers -->
  <rect x="40" y="55" width="140" height="35" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">Browser</text>

  <rect x="258" y="55" width="164" height="35" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="340" y="71" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">local_ui_server.py</text>
  <text x="340" y="84" text-anchor="middle" font-size="9" fill="#92400e">VM · Port 5500</text>

  <rect x="530" y="55" width="160" height="35" rx="6" fill="#fde68a" stroke="#b45309" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="610" y="71" text-anchor="middle" font-size="11" font-weight="700" fill="#78350f">applio_runner.py</text>
  <text x="610" y="84" text-anchor="middle" font-size="9" fill="#92400e">Host · Port 5600</text>

  <rect x="800" y="55" width="140" height="35" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="870" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">Applio CLI</text>

  <!-- Step 1: Browser → UI-Server -->
  <line x1="110" y1="122" x2="340" y2="122" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="148" y="104" width="155" height="16" rx="3" fill="#dbeafe"/>
  <text x="225" y="116" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">1. POST /api/run</text>
  <text x="225" y="138" text-anchor="middle" font-size="9" fill="#64748b">{ "voice_id": "X", "text": "Hallo..." }</text>

  <!-- Step 2: Validate (UI-Server self) -->
  <rect x="300" y="155" width="80" height="28" rx="5" fill="#fefce8" stroke="#d97706" stroke-width="1"/>
  <text x="340" y="174" text-anchor="middle" font-size="10" fill="#78350f">2. Validieren</text>

  <!-- Step 3: UI-Server → Runner -->
  <line x1="340" y1="198" x2="610" y2="198" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <rect x="393" y="180" width="163" height="16" rx="3" fill="#fde68a"/>
  <text x="475" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">3. POST /tts</text>
  <text x="475" y="214" text-anchor="middle" font-size="9" fill="#64748b">{ voice_id, text, tts_voice, tts_rate }</text>

  <!-- Step 4: Runner resolves model + temp dir -->
  <rect x="565" y="228" width="90" height="42" rx="5" fill="#fef9c3" stroke="#b45309" stroke-width="1"/>
  <text x="610" y="246" text-anchor="middle" font-size="10" fill="#78350f">4. Modell auflösen</text>
  <text x="610" y="261" text-anchor="middle" font-size="9" fill="#64748b">+ temp dir erstellen</text>

  <!-- Step 5: Runner → Applio subprocess -->
  <line x1="610" y1="284" x2="870" y2="284" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="740" y="277" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">5. subprocess.run()</text>
  <text x="740" y="299" text-anchor="middle" font-size="9" fill="#64748b">python core.py tts --tts_text "..." ...</text>

  <!-- Applio processing box -->
  <rect x="832" y="316" width="76" height="88" rx="5" fill="#d1fae5" stroke="#16a34a" stroke-width="1"/>
  <text x="870" y="337" text-anchor="middle" font-size="10" fill="#14532d">6.</text>
  <text x="870" y="351" text-anchor="middle" font-size="10" fill="#14532d">TTS</text>
  <text x="870" y="365" text-anchor="middle" font-size="8" fill="#64748b">Edge-Stimme</text>
  <line x1="840" y1="373" x2="900" y2="373" stroke="#16a34a" stroke-width="0.5"/>
  <text x="870" y="388" text-anchor="middle" font-size="10" fill="#14532d">RVC</text>
  <text x="870" y="400" text-anchor="middle" font-size="8" fill="#64748b">Voice Conv.</text>

  <!-- Step 7: Runner returns Base64 to UI-Server -->
  <line x1="870" y1="404" x2="610" y2="430" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="740" y="425" text-anchor="middle" font-size="10" font-weight="600" fill="#14532d">7. { audio_base64, format: "wav" }</text>

  <!-- Step 8: UI-Server decodes + saves -->
  <rect x="272" y="448" width="135" height="42" rx="5" fill="#fefce8" stroke="#d97706" stroke-width="1"/>
  <text x="340" y="465" text-anchor="middle" font-size="10" fill="#78350f">8. Base64 dekodieren</text>
  <text x="340" y="480" text-anchor="middle" font-size="9" fill="#64748b">→ output/&lt;uuid&gt;.wav</text>

  <!-- Step 9: UI-Server → Browser JSON -->
  <line x1="340" y1="504" x2="110" y2="504" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="225" y="497" text-anchor="middle" font-size="10" font-weight="600" fill="#1e3a8a">9. JSON Response</text>
  <text x="225" y="520" text-anchor="middle" font-size="9" fill="#64748b">{ "output_audio_url": "/storage/output/&lt;uuid&gt;.wav" }</text>

  <!-- Step 10: Browser → UI-Server GET -->
  <line x1="110" y1="548" x2="340" y2="548" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowR)"/>
  <text x="225" y="541" text-anchor="middle" font-size="10" font-weight="600" fill="#0284c7">10. GET /storage/output/&lt;uuid&gt;.wav</text>

  <!-- Step 11: UI-Server → Browser WAV -->
  <line x1="340" y1="572" x2="110" y2="572" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowR)"/>
  <text x="225" y="590" text-anchor="middle" font-size="10" fill="#0284c7">11. WAV-Datei (Binary) → Wiedergabe / Download</text>

  <!-- Note about runner-to-ui-server arrow direction -->
  <line x1="610" y1="430" x2="340" y2="448" stroke="#b45309" stroke-width="1.5" marker-end="url(#arrowR)"/>
</svg>
